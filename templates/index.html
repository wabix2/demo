<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethiopian Agri‑Advisor</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50">
  <div class="max-w-2xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-green-800 mb-4">🌱 Ethiopian Farming & Health Assistant</h1>
    <div id="chat-box" class="bg-white rounded-lg shadow p-4 h-96 overflow-y-auto mb-4 border border-green-200">
      <div class="text-gray-500">Ask me about teff, livestock, health, or education...</div>
    </div>
    <form id="chat-form" class="flex gap-2">
      <input type="text" id="message" placeholder="Type your question..." 
             class="flex-1 border border-green-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
      <button type="submit" class="bg-green-700 text-white px-4 py-2 rounded hover:bg-green-800">Send</button>
    </form>
  </div>

  <script>
    const box = document.getElementById('chat-box');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('message');

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `mb-2 ${sender === 'user' ? 'text-right' : 'text-left'}`;
      div.innerHTML = `<span class="inline-block px-4 py-2 rounded-lg ${sender === 'user' ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-800'}">${text}</span>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;
      addMessage(msg, 'user');
      input.value = '';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: msg})
        });
        const data = await res.json();
        addMessage(data.response, 'bot');
      } catch (err) {
        addMessage('Error: Could not reach server.', 'bot');
      }
    });
  </script>
</body>
</html>
